<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Python-RAG Scraper</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <h2>Python-RAG</h2>
      <button id="logoutBtn" class="hidden">Logout</button>
    </header>

    <!-- Login View -->
    <div id="loginView" class="view">
      <form id="loginForm">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required>
        </div>
        <button type="submit" class="btn primary-btn">Login</button>
        <p id="loginError" class="error-msg"></p>
      </form>
    </div>

    <!-- Main View -->
    <div id="mainView" class="view hidden">
      <div class="action-section">
        <button id="scrapeBtn" class="btn primary-btn">Scrape Current Page</button>
        <p id="scrapeStatus" class="status-msg"></p>
      </div>
      
      <div class="chat-section">
        <div id="chatHistory" class="chat-history"></div>
        <div class="chat-input-container">
          <input type="text" id="chatInput" placeholder="Ask about this page..." disabled>
          <button id="sendBtn" class="btn send-btn" disabled>Send</button>
        </div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
